# IDMatr NATS Server — Production Configuration
# Transport security: per-service authentication enforced
# TLS: DISABLED for local development (enable in production with valid certs)
# Monitoring: LOCALHOST ONLY for health checks (not exposed externally)

listen: 0.0.0.0:4222

# Monitoring HTTP — LOCALHOST ONLY (not exposed to external networks)
http: 127.0.0.1:8222

jetstream: enabled

# Connection hardening
max_connections: 1000
max_payload: 8MB
ping_interval: "30s"
ping_max: 3
write_deadline: "10s"

# Production TLS — DISABLED for local dev
# Enable in production:
# tls {
#   cert_file:  "/etc/nats/certs/server.crt"
#   key_file:   "/etc/nats/certs/server.key"
#   ca_file:    "/etc/nats/certs/ca.crt"
#   timeout:    3
#   verify:     true
# }

authorization {
  users = [
    {
      user: "api_gateway"
      password: $NATS_API_GATEWAY_PASSWORD
      permissions = {
        publish = [
          "{\"cmd\":\"get_all_identities\"}",
          "{\"cmd\":\"get_identity\"}",
          "{\"cmd\":\"create_user\"}",
          "{\"cmd\":\"update_user_risk\"}",
          "{\"cmd\":\"get_identity_analytics\"}",
          "{\"cmd\":\"get_all_apps\"}",
          "{\"cmd\":\"trigger_scan\"}",
          "{\"cmd\":\"get_app_intelligence\"}",
          "{\"cmd\":\"get_all_workflows\"}",
          "{\"cmd\":\"create_workflow\"}",
          "{\"cmd\":\"update_workflow\"}",
          "{\"cmd\":\"get_jml_events\"}",
          "{\"cmd\":\"create_jml_event\"}",
          "{\"cmd\":\"get_all_risk_scores\"}",
          "{\"cmd\":\"get_all_risk_events\"}",
          "{\"cmd\":\"get_itdr_threats\"}",
          "{\"cmd\":\"respond_to_threat\"}",
          "{\"cmd\":\"get_risk_trends\"}",
          "{\"cmd\":\"get_identity_graph\"}",
          "{\"cmd\":\"get_toxic_combinations\"}",
          "{\"cmd\":\"get_attack_paths\"}",
          "{\"cmd\":\"get_privilege_creep\"}",
          "{\"cmd\":\"get_stale_access\"}",
          "{\"cmd\":\"get_identity_risk_recommendations\"}",
          "{\"cmd\":\"check_policy\"}",
          "{\"cmd\":\"get_policies\"}",
          "{\"cmd\":\"get_policy_violations\"}",
          "{\"cmd\":\"get_audit_logs\"}",
          "{\"cmd\":\"verify_audit_logs\"}",
          "{\"cmd\":\"send_notification\"}",
          "{\"cmd\":\"enqueue_job\"}",
          "{\"cmd\":\"get_job_status\"}"
        ]
        subscribe = ["_INBOX.>"]
      }
    },
    {
      user: "identity_service"
      password: $NATS_IDENTITY_SERVICE_PASSWORD
      permissions = {
        publish = ["_INBOX.>"]
        subscribe = [
          "{\"cmd\":\"get_all_identities\"}",
          "{\"cmd\":\"get_identity\"}",
          "{\"cmd\":\"create_user\"}",
          "{\"cmd\":\"update_user_risk\"}",
          "{\"cmd\":\"get_identity_analytics\"}"
        ]
      }
    },
    {
      user: "discovery_service"
      password: $NATS_DISCOVERY_SERVICE_PASSWORD
      permissions = {
        publish = ["_INBOX.>"]
        subscribe = [
          "{\"cmd\":\"get_all_apps\"}",
          "{\"cmd\":\"trigger_scan\"}",
          "{\"cmd\":\"get_app_intelligence\"}"
        ]
      }
    },
    {
      user: "governance_service"
      password: $NATS_GOVERNANCE_SERVICE_PASSWORD
      permissions = {
        publish = ["_INBOX.>"]
        subscribe = [
          "{\"cmd\":\"get_all_workflows\"}",
          "{\"cmd\":\"create_workflow\"}",
          "{\"cmd\":\"update_workflow\"}",
          "{\"cmd\":\"get_jml_events\"}",
          "{\"cmd\":\"create_jml_event\"}"
        ]
      }
    },
    {
      user: "risk_engine"
      password: $NATS_RISK_ENGINE_PASSWORD
      permissions = {
        publish = ["_INBOX.>"]
        subscribe = [
          "{\"cmd\":\"get_all_risk_scores\"}",
          "{\"cmd\":\"get_all_risk_events\"}",
          "{\"cmd\":\"get_itdr_threats\"}",
          "{\"cmd\":\"respond_to_threat\"}",
          "{\"cmd\":\"get_risk_trends\"}",
          "{\"cmd\":\"calculate_risk\"}",
          "{\"cmd\":\"detect_itdr_patterns\"}"
        ]
      }
    },
    {
      user: "audit_service"
      password: $NATS_AUDIT_SERVICE_PASSWORD
      permissions = {
        publish = ["_INBOX.>"]
        subscribe = [
          "{\"cmd\":\"log_action\"}",
          "{\"cmd\":\"get_audit_logs\"}",
          "{\"cmd\":\"verify_audit_logs\"}"
        ]
      }
    },
    {
      user: "policy_engine"
      password: $NATS_POLICY_ENGINE_PASSWORD
      permissions = {
        publish = ["_INBOX.>"]
        subscribe = [
          "{\"cmd\":\"check_policy\"}",
          "{\"cmd\":\"get_policies\"}",
          "{\"cmd\":\"get_policy_violations\"}"
        ]
      }
    },
    {
      user: "graph_service"
      password: $NATS_GRAPH_SERVICE_PASSWORD
      permissions = {
        publish = ["_INBOX.>"]
        subscribe = [
          "{\"cmd\":\"get_identity_graph\"}",
          "{\"cmd\":\"get_toxic_combinations\"}",
          "{\"cmd\":\"get_attack_paths\"}",
          "{\"cmd\":\"get_privilege_creep\"}",
          "{\"cmd\":\"get_stale_access\"}",
          "{\"cmd\":\"get_identity_risk_recommendations\"}"
        ]
      }
    },
    {
      user: "notification_service"
      password: $NATS_NOTIFICATION_SERVICE_PASSWORD
      permissions = {
        publish = ["_INBOX.>"]
        subscribe = ["{\"cmd\":\"send_notification\"}"]
      }
    },
    {
      user: "worker_queue"
      password: $NATS_WORKER_QUEUE_PASSWORD
      permissions = {
        publish = ["_INBOX.>"]
        subscribe = [
          "{\"cmd\":\"enqueue_job\"}",
          "{\"cmd\":\"get_job_status\"}"
        ]
      }
    }
  ]
}
