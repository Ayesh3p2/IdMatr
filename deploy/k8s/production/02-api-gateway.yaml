apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: idmatr
  labels:
    app: api-gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/ayesh3p2/idmatr-api-gateway:latest
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: idmatr-secrets
                  key: JWT_SECRET
            - name: INTERNAL_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: idmatr-secrets
                  key: INTERNAL_API_SECRET
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: NATS_URL
              value: "nats://nats:4222"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: idmatr
spec:
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 3001
  type: ClusterIP
