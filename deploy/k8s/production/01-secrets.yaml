apiVersion: v1
kind: Secret
metadata:
  name: idmatr-secrets
  namespace: idmatr
type: Opaque
stringData:
  # Generate with: openssl rand -base64 64
  JWT_SECRET: "REPLACE_WITH_64_CHAR_RANDOM_STRING"
  INTERNAL_API_SECRET: "REPLACE_WITH_64_CHAR_RANDOM_STRING"
  DATA_ENCRYPTION_KEY: "REPLACE_WITH_32_BYTE_BASE64_VALUE"
  CONTROL_PLANE_JWT_SECRET: "REPLACE_WITH_64_CHAR_RANDOM_STRING"
---
apiVersion: v1
kind: Secret
metadata:
  name: idmatr-db-secrets
  namespace: idmatr
type: Opaque
stringData:
  # Generate with: openssl rand -base64 32
  POSTGRES_PASSWORD: "REPLACE_WITH_STRONG_PASSWORD"
  REDIS_PASSWORD: "REPLACE_WITH_STRONG_PASSWORD"
---
apiVersion: v1
kind: Secret
metadata:
  name: idmatr-smtp-secrets
  namespace: idmatr
type: Opaque
stringData:
  SMTP_PASS: "REPLACE_WITH_SMTP_PASSWORD"
