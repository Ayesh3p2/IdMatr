apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  namespace: idmatr
  labels:
    app: control-plane
spec:
  replicas: 2
  selector:
    matchLabels:
      app: control-plane
  template:
    metadata:
      labels:
        app: control-plane
    spec:
      containers:
        - name: control-plane
          image: ghcr.io/ayesh3p2/idmatr-control-plane:latest
          ports:
            - containerPort: 3010
          env:
            - name: NODE_ENV
              value: "production"
            - name: CONTROL_PLANE_PORT
              value: "3010"
            - name: CONTROL_PLANE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: idmatr-secrets
                  key: CONTROL_PLANE_JWT_SECRET
            - name: INTERNAL_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: idmatr-secrets
                  key: INTERNAL_API_SECRET
            - name: DATA_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: idmatr-secrets
                  key: DATA_ENCRYPTION_KEY
            - name: CONTROL_PLANE_DATABASE_URL
              value: "postgresql://postgres:5432/idmatr"
            - name: REDIS_URL
              value: "redis://redis:6379"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3010
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3010
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: control-plane
  namespace: idmatr
spec:
  selector:
    app: control-plane
  ports:
    - port: 80
      targetPort: 3010
  type: ClusterIP
