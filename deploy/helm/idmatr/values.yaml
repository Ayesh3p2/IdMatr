replicaCount: 2

image:
  repository: ghcr.io/ayesh3p2/idmatr
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: idmatr.io
      paths: []
  tls:
    - secretName: idmatr-tls
      hosts:
        - idmatr.io

config:
  jwtSecret: ""
  internalApiSecret: ""
  dataEncryptionKey: ""
  databaseUrl: ""
  redisUrl: ""
  natsUrl: ""

env: {}
