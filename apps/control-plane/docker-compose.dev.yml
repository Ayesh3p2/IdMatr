version: '3.8'

services:
  control-plane:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: idmatr-control-plane-dev
    restart: unless-stopped
    ports:
      - "3010:3010"
      - "9229:9229"  # Debug port
    environment:
      - NODE_ENV=development
      - CONTROL_PLANE_DATABASE_URL=postgresql://idmatr_user:idmatr_password@postgres:5432/idmatr_dev
      - JWT_SECRET=dev-super-secret-key-change-in-production-32-chars-min
      - ENCRYPTION_KEY=dev-encryption-key-32-chars-min-change-in-production
      - MFA_ISSUER=idmatr-dev
      - LOG_LEVEL=debug
      - DEBUG_MODE=true
    volumes:
      - .:/app
      - /app/node_modules
      - ./logs:/app/logs
      - ./prisma:/app/prisma
    networks:
      - idmatr-dev-network
    depends_on:
      - postgres
      - redis
    command: npm run start:dev

  postgres:
    image: postgres:15-alpine
    container_name: idmatr-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: idmatr_dev
      POSTGRES_USER: idmatr_user
      POSTGRES_PASSWORD: idmatr_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./scripts/init-dev-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    networks:
      - idmatr-dev-network

  redis:
    image: redis:7-alpine
    container_name: idmatr-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - idmatr-dev-network

  adminer:
    image: adminer:latest
    container_name: idmatr-adminer-dev
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DEFAULT_DB_NAME: idmatr_dev
      ADMINER_DEFAULT_USER: idmatr_user
      ADMINER_DEFAULT_PASSWORD: idmatr_password
    networks:
      - idmatr-dev-network
    depends_on:
      - postgres

volumes:
  postgres_dev_data:
    driver: local
  redis_dev_data:
    driver: local

networks:
  idmatr-dev-network:
    driver: bridge
