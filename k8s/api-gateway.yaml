apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: idmatr
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ${IMAGE_REGISTRY}/api-gateway:${IMAGE_TAG:-latest}
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: idmatr-secrets
                  key: JWT_SECRET
            - name: NATS_URL
              valueFrom:
                configMapKeyRef:
                  name: idmatr-config
                  key: NATS_URL
            - name: ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: idmatr-config
                  key: ALLOWED_ORIGINS
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: idmatr-config
                  key: NODE_ENV
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: idmatr
spec:
  selector:
    app: api-gateway
  ports:
    - port: 3001
      targetPort: 3001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-dashboard
  namespace: idmatr
spec:
  replicas: 2
  selector:
    matchLabels:
      app: admin-dashboard
  template:
    metadata:
      labels:
        app: admin-dashboard
    spec:
      containers:
        - name: admin-dashboard
          image: ${IMAGE_REGISTRY}/admin-dashboard:${IMAGE_TAG:-latest}
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://api-gateway:3001"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: idmatr-config
                  key: NODE_ENV
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: admin-dashboard
  namespace: idmatr
spec:
  selector:
    app: admin-dashboard
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: idmatr-ingress
  namespace: idmatr
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-dashboard
                port:
                  number: 3000
