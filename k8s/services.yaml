# All microservice deployments
# Replace IMAGE_REGISTRY and IMAGE_TAG with your values (e.g., gcr.io/my-project or AWS ECR)

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: idmatr
spec:
  replicas: 2
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
    spec:
      containers:
        - name: identity-service
          image: ${IMAGE_REGISTRY}/identity-service:${IMAGE_TAG:-latest}
          env:
            - name: DATABASE_URL
              value: "postgresql://idmatr:$(POSTGRES_PASSWORD)@postgres:5432/idmatr_db?schema=identity_service"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: idmatr-secrets
                  key: POSTGRES_PASSWORD
            - name: NATS_URL
              valueFrom:
                configMapKeyRef:
                  name: idmatr-config
                  key: NATS_URL
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: idmatr-config
                  key: NODE_ENV
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
