version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: idmatr
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: idmatr_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/password123
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  nats:
    image: nats:2.9
    ports:
      - "4222:4222"
      - "8222:8222"

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
