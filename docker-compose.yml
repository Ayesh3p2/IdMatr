services:

  # ─────────────────────────────────────────
  # INFRASTRUCTURE
  # ─────────────────────────────────────────

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: idmatr
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: idmatr_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idmatr -d idmatr_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 300M

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 256m
      NEO4J_dbms_memory_heap_max__size: 512m
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M

  nats:
    image: nats:2.9-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--http_port", "8222", "--jetstream", "--max_payload", "1MB"]
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

  # ─────────────────────────────────────────
  # MICROSERVICES
  # ─────────────────────────────────────────

  identity-service:
    build:
      context: .
      dockerfile: services/identity-service/Dockerfile
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://idmatr:${POSTGRES_PASSWORD}@postgres:5432/idmatr_db?schema=identity_service
      NATS_URL: nats://nats:4222
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M

  discovery-service:
    build:
      context: .
      dockerfile: services/discovery-service/Dockerfile
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://idmatr:${POSTGRES_PASSWORD}@postgres:5432/idmatr_db?schema=discovery_service
      NATS_URL: nats://nats:4222
      NODE_ENV: ${NODE_ENV:-production}
      DEMO_MODE: ${DEMO_MODE:-false}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M

  governance-service:
    build:
      context: .
      dockerfile: services/governance-service/Dockerfile
    environment:
      PORT: 3002
      DATABASE_URL: postgresql://idmatr:${POSTGRES_PASSWORD}@postgres:5432/idmatr_db?schema=governance_service
      NATS_URL: nats://nats:4222
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M

  risk-engine:
    build:
      context: .
      dockerfile: services/risk-engine/Dockerfile
    environment:
      PORT: 3003
      DATABASE_URL: postgresql://idmatr:${POSTGRES_PASSWORD}@postgres:5432/idmatr_db?schema=risk_engine
      NATS_URL: nats://nats:4222
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M

  audit-service:
    build:
      context: .
      dockerfile: services/audit-service/Dockerfile
    environment:
      PORT: 3004
      DATABASE_URL: postgresql://idmatr:${POSTGRES_PASSWORD}@postgres:5432/idmatr_db?schema=audit_service
      NATS_URL: nats://nats:4222
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.30'
          memory: 192M

  policy-engine:
    build:
      context: .
      dockerfile: services/policy-engine/Dockerfile
    environment:
      PORT: 3005
      DATABASE_URL: postgresql://idmatr:${POSTGRES_PASSWORD}@postgres:5432/idmatr_db?schema=identity_service
      NATS_URL: nats://nats:4222
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.30'
          memory: 192M

  graph-service:
    build:
      context: .
      dockerfile: services/graph-service/Dockerfile
    environment:
      PORT: 3006
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      NATS_URL: nats://nats:4222
      NODE_ENV: ${NODE_ENV:-production}
      DEMO_MODE: ${DEMO_MODE:-false}
    depends_on:
      neo4j:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    environment:
      PORT: 3007
      NATS_URL: nats://nats:4222
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      nats:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3007/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.30'
          memory: 192M

  worker-queue:
    build:
      context: .
      dockerfile: services/worker-queue/Dockerfile
    environment:
      PORT: 3008
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      NATS_URL: nats://nats:4222
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3008/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M

  # ─────────────────────────────────────────
  # API GATEWAY
  # ─────────────────────────────────────────

  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      NATS_URL: nats://nats:4222
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      nats:
        condition: service_healthy
      identity-service:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      governance-service:
        condition: service_healthy
      risk-engine:
        condition: service_healthy
      audit-service:
        condition: service_healthy
      policy-engine:
        condition: service_healthy
      graph-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      worker-queue:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 384M

  # ─────────────────────────────────────────
  # ADMIN DASHBOARD
  # ─────────────────────────────────────────

  admin-dashboard:
    build:
      context: apps/admin-dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      api-gateway:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
