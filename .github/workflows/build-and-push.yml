name: Build and Push Docker Images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/idmatr

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - name: identity-service
            dockerfile: services/identity-service/Dockerfile
          - name: discovery-service
            dockerfile: services/discovery-service/Dockerfile
          - name: governance-service
            dockerfile: services/governance-service/Dockerfile
          - name: risk-engine
            dockerfile: services/risk-engine/Dockerfile
          - name: audit-service
            dockerfile: services/audit-service/Dockerfile
          - name: policy-engine
            dockerfile: services/policy-engine/Dockerfile
          - name: graph-service
            dockerfile: services/graph-service/Dockerfile
          - name: notification-service
            dockerfile: services/notification-service/Dockerfile
          - name: worker-queue
            dockerfile: services/worker-queue/Dockerfile
          - name: api-gateway
            dockerfile: apps/api-gateway/Dockerfile
          - name: admin-dashboard
            dockerfile: apps/admin-dashboard/Dockerfile
            context: apps/admin-dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context || '.' }}
          file: ${{ matrix.service.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
