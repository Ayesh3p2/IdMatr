name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      release-url: ${{ steps.create_release.outputs.url }}
      upload-url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        working-directory: ./apps/control-plane
        run: npm ci

      - name: Build application
        working-directory: ./apps/control-plane
        run: npm run build:prod

      - name: Generate changelog
        id: changelog
        run: |
          # Generate changelog from git commits since last tag
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD^)..HEAD) > CHANGELOG.md
          cat CHANGELOG.md
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: actions/create-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: |
            ## Changes
            ${{ steps.changelog.outputs.CHANGELOG }}
            
            ## Installation
            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            docker run -p 3010:3010 ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```
            
            ## Docker Image
            `ghcr.io/${{ github.repository }}:${{ github.ref_name }}`
          draft: false
          prerelease: false

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=IDMatr Control Plane
            org.opencontainers.image.description=Multi-tenant identity platform control plane
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/control-plane
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [create-release, build-and-push]
    environment: production
    steps:
      - name: Deploy to production
        run: |
          echo "🚀 Deploying version ${{ github.ref_name }} to production..."
          # Add your production deployment commands here
          # Example deployment commands:
          # kubectl set image deployment/idmatr-control-plane idmatr-control-plane=ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          # kubectl apply -f k8s/production/
          # kubectl rollout status deployment/idmatr-control-plane

      - name: Health check
        run: |
          echo "⏳ Waiting for deployment to be healthy..."
          sleep 30
          # Add health check commands here
          # curl -f https://api.idmatr.com/health || exit 1

      - name: Notify deployment success
        run: |
          echo "✅ Successfully deployed version ${{ github.ref_name }} to production"
          # Add notification commands here
          # curl -X POST -H 'Authorization: Bearer $SLACK_TOKEN' \
          #   -H 'Content-type: application/json' \
          #   --data '{"text":"🚀 IDMatr v${{ github.ref_name }} deployed to production"}' \
          #   https://hooks.slack.com/services/YOUR_SLACK_WEBHOOK
