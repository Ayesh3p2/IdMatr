name: Security CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  security-events: write   # Required for SARIF upload to GitHub Security tab
  actions: read

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Secret scanning — block on any leaked credentials
  # ─────────────────────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for accurate delta scans
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. SAST + dependency audit + tests
  # ─────────────────────────────────────────────────────────────────────────────
  sast-and-tests:
    name: SAST + Tests + Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Workspace build verification
        run: npm run build --workspaces --if-present

      - name: Node dependency vulnerability audit
        run: npm audit --workspaces --audit-level=high

      - name: Unit tests
        run: npm test --workspaces --if-present

      - name: Integration tests
        run: npm run test:e2e --workspaces --if-present

      - name: Semgrep SAST
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/nodejs
            p/typescript
          generateSarif: "1"
        continue-on-error: false

      - name: Upload Semgrep SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Docker compose build verification
        run: docker compose build --parallel

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Container security — lint all Dockerfiles + image vulnerability scan
  # ─────────────────────────────────────────────────────────────────────────────
  container-security:
    name: Container Security (Hadolint + Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Hadolint — API Gateway
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: apps/api-gateway/Dockerfile

      - name: Hadolint — Admin Dashboard
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: apps/admin-dashboard/Dockerfile

      - name: Hadolint — Control Plane
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: apps/control-plane/Dockerfile

      - name: Hadolint — Identity Service
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: services/identity-service/Dockerfile

      - name: Hadolint — Audit Service
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: services/audit-service/Dockerfile

      - name: Hadolint — Risk Engine
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: services/risk-engine/Dockerfile

      - name: Trivy filesystem scan (CRITICAL + HIGH)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          vuln-type: os,library
          severity: CRITICAL,HIGH
          exit-code: '1'
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. SBOM generation — produce Software Bill of Materials for compliance
  # ─────────────────────────────────────────────────────────────────────────────
  sbom:
    name: SBOM Generation (Syft)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
          artifact-name: idmatr-sbom-${{ github.sha }}.spdx.json

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          artifact-name: idmatr-sbom-${{ github.sha }}.cyclonedx.json

      - name: Scan SBOM for known vulnerabilities (Grype)
        uses: anchore/scan-action@v4
        with:
          sbom: sbom.spdx.json
          fail-build: true
          severity-cutoff: critical

  # ─────────────────────────────────────────────────────────────────────────────
  # 5. License compliance — detect non-permissive license usage
  # ─────────────────────────────────────────────────────────────────────────────
  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check licenses
        run: |
          npx license-checker --production --onlyAllow \
            "MIT;ISC;BSD-2-Clause;BSD-3-Clause;Apache-2.0;Python-2.0;CC0-1.0;Unlicense;0BSD;BlueOak-1.0.0" \
            --excludePackages "caniuse-lite@1" \
            --summary 2>&1 || echo "⚠️ License check completed with warnings — review output above"
